{% extends 'base.html' %}
{% block content %}
<h2>Student Profile</h2>
<form method="post">
  <div class="mb-3"><label>Full name</label><input name="full_name" class="form-control" value="{{ profile.full_name if profile }}"></div>
  <div class="mb-3"><label>College/School</label><input name="school" class="form-control" value="{{ profile.school if profile }}"></div>
  <div class="mb-3"><label>Department</label><input name="department" class="form-control" value="{{ profile.department if profile }}"></div>
  <div class="mb-3"><label>Subjects (choose at least 1)</label>
    <div class="form-check">
      {% for subj in subjects %}
      <input class="form-check-input" type="checkbox" name="subjects" value="{{ subj }}" id="subj-{{ loop.index }}" {% if profile and subj in (profile.subjects or '') %}checked{% endif %}> 
      <label class="form-check-label" for="subj-{{ loop.index }}">{{ subj }}</label><br>
      {% endfor %}
    </div>
  </div>
  <div class="mb-3"><label>Daily study goal (minutes)</label><input type="number" name="daily_goal" class="form-control" min="30" value="{{ profile.daily_goal if profile else 60 }}"></div>
  <button class="btn btn-primary">Save profile</button>
</form>
{% endblock %}
