{% extends 'base.html' %}
{% block content %}
<h2>AI Doubt Solver</h2>
<form method="post">
  <div class="mb-3"><label>Ask a question</label><textarea class="form-control" name="question" rows="3" required>{{ question or '' }}</textarea></div>
  <button class="btn btn-primary">Ask AI</button>
</form>
{% if answer %}
<div class="card mt-3"><div class="card-body"><h5>Answer</h5><pre style="white-space: pre-wrap;">{{ answer }}</pre></div></div>
{% endif %}
{% endblock %}
