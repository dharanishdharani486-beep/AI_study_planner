{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h1 class="mb-1">AI Doubt Solver</h1>
  <p class="text-muted mb-4">Ask any study-related question and get detailed explanations from AI</p>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-bold">Your Question</label>
          <textarea class="form-control" name="question" rows="4" placeholder="Ask your study question..." required>{{ question or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="fas fa-lightbulb"></i> Get Answer from AI
        </button>
      </form>
    </div>
  </div>

  {% if answer %}
  <div class="card shadow-lg">
    <div class="card-body p-4">
      <div class="answer-content">
        <p class="answer-paragraph">{{ answer }}</p>
      </div>
    </div>
  </div>

  <div class="mt-4">
    <a href="{{ url_for('ai_chat') }}" class="btn btn-secondary">
      <i class="fas fa-redo"></i> Ask Another Question
    </a>
  </div>
  {% endif %}
</div>

<style>
  .answer-content {
    font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
    color: #2c3e50;
  }

  .answer-section {
    color: #0056b3;
    border-left: 5px solid #0056b3;
    padding-left: 1rem;
    margin-top: 2rem;
    margin-bottom: 1rem;
    font-weight: 700;
    font-size: 1.5rem;
    page-break-after: avoid;
  }

  .answer-heading {
    color: #0056b3;
    border-left: 4px solid #0056b3;
    padding-left: 1rem;
    margin-top: 1.5rem;
    margin-bottom: 1rem;
    font-weight: 600;
    font-size: 1.2rem;
    page-break-after: avoid;
  }

  .answer-title {
    color: #0056b3;
    border-left: 6px solid #0056b3;
    padding-left: 1rem;
    margin-top: 2.5rem;
    margin-bottom: 1.5rem;
    font-weight: 700;
    font-size: 1.8rem;
    page-break-after: avoid;
  }

  .answer-numbered {
    margin-left: 2rem;
    margin-bottom: 0.8rem;
    line-height: 1.7;
    font-size: 1.05rem;
    padding-left: 0.5rem;
  }

  .answer-paragraph {
    line-height: 1.8;
    margin-bottom: 1rem;
    text-align: justify;
    font-size: 1.05rem;
  }

  .answer-spacing {
    height: 0.5rem;
  }
</style>
{% endblock %}
