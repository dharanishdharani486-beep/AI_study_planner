{% extends 'base.html' %}
{% block content %}
<div class="d-grid" style="gap:22px;" id="weeklyTestRoot"
  data-student-id="{{ student_id }}"
  data-student-class-id="{{ student_class_id or '' }}"
  data-student-section="{{ student_section or '' }}">
  <div class="shell-card" style="padding:24px;">
    <h3 class="section-title mb-2">Weekly Test (50 Marks)</h3>
    <p class="text-muted">Strict mode enabled: tab switch and copy actions are monitored.</p>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="field-caption">Subject</label>
        <select id="subjectSelect" class="form-select">
          <option value="" selected disabled>Select subject</option>
          {% for s in subjects %}
          <option value="{{ s }}">{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6 d-flex align-items-end">
        <button id="startBtn" type="button" class="btn btn-brand w-100">Start Weekly Test</button>
      </div>
    </div>

    <div id="status" class="text-muted mt-3"></div>
    <div id="timer" class="mt-2" style="font-weight:700;"></div>
  </div>

  <div class="shell-card" style="padding:24px; display:none;" id="testWrap">
    <form id="testForm" class="d-grid" style="gap:14px;"></form>
    <div class="mt-3">
        <button id="submitBtn" type="button" class="btn btn-brand">Submit Test</button>
    </div>
    <div id="result" class="mt-3"></div>
  </div>
</div>

<script>
  (function () {
    const rootNode = document.getElementById('weeklyTestRoot');
    const studentId = Number(rootNode?.dataset?.studentId || 0) || null;
    const student_id = window.student_id || studentId || 1;
    window.student_id = student_id;
    const studentClassId = Number(rootNode?.dataset?.studentClassId || 0) || null;
    const studentSection = (rootNode?.dataset?.studentSection || '').trim();
    const subjectSelect = document.getElementById('subjectSelect');
    const startBtn = document.getElementById('startBtn');
    const submitBtn = document.getElementById('submitBtn');
    const statusNode = document.getElementById('status');
    const timerNode = document.getElementById('timer');
    const testWrap = document.getElementById('testWrap');
    const form = document.getElementById('testForm');
    const result = document.getElementById('result');

    let active = null;
    let seconds = 0;
    let timer = null;
    let testStartedAtMs = 0;
    let lastTabViolationAt = 0;

    function formatTime(s) {
      const mm = String(Math.floor(s / 60)).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      return mm + ':' + ss;
    }

    function collectAnswers() {
      const out = {};
      (active.questions || []).forEach((q) => {
        const checked = form.querySelector('input[name="q_' + q.id + '"]:checked');
        if (checked) out[q.id] = Number(checked.value);
      });
      return out;
    }

    function getExamSessionId() {
      return active && active.exam_session_id ? active.exam_session_id : '';
    }

    async function sendViolation(eventType, details) {
      const payload = {
        student_id: student_id,
        class_id: studentClassId,
        section: studentSection,
        violation_type: eventType,
        timestamp: new Date().toISOString(),
        exam_session_id: getExamSessionId(),
        details: details || ''
      };

      try {
        const res = await fetch('/log_violation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          keepalive: true,
          body: JSON.stringify(payload)
        });
        const data = await res.json().catch(() => ({}));
        console.log('Violation logged:', { status: res.status, payload: payload, response: data });
      } catch (err) {
        console.error('Error:', err, payload);
      }
    }

    function reportTabSwitch(detailsText) {
      const now = Date.now();
      if (now - lastTabViolationAt < 1500) return;
      lastTabViolationAt = now;
      console.log('Tab switched');
      sendViolation('tab_switch', detailsText);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        reportTabSwitch('User switched tab during exam');
      }
    });

    // Backup for cases where visibilitychange may not fire consistently.
    window.addEventListener('blur', () => {
      console.log('Window lost focus');
      reportTabSwitch('Window lost focus');
    });

    document.addEventListener('contextmenu', (e) => {
      if (!active) return;
      e.preventDefault();
      sendViolation('right_click', 'Right-click blocked during weekly test.');
    });

    document.addEventListener('copy', (e) => {
      if (!active) return;
      e.preventDefault();
      sendViolation('copy_attempt', 'Copy action blocked during weekly test.');
    });

    document.addEventListener('paste', (e) => {
      if (!active) return;
      e.preventDefault();
      sendViolation('paste_attempt', 'Paste action blocked during weekly test.');
    });

    document.addEventListener('fullscreenchange', () => {
      if (!active) return;
      if (!document.fullscreenElement) {
        sendViolation('fullscreen_exit', 'Student exited fullscreen during weekly test.');
      }
    });

    // Optional hook for face detection modules.
    window.reportMultipleFaceDetected = function () {
      if (!active) return;
      sendViolation('multiple_face', 'Multiple face detection signal received from proctoring module.');
    };

    async function startTest() {
      console.log('[Weekly Test] Start button clicked');
      const subject = subjectSelect.value;
      if (!subject) {
        console.warn('[Weekly Test] No subject selected');
        statusNode.textContent = 'Please select a subject first.';
        return;
      }

      console.log('[Weekly Test] Calling /start_test for subject:', subject);
      const resp = await fetch('/start_test?subject=' + encodeURIComponent(subject));
      const data = await resp.json();
      if (!resp.ok || !data.ok) {
        console.error('[Weekly Test] Backend error:', data);
        statusNode.textContent = data.message || 'Unable to start test.';
        return;
      }

      active = data;
      testStartedAtMs = Date.now();
      statusNode.textContent = 'Strict mode active. Avoid tab switches.';
      testWrap.style.display = 'block';
      form.innerHTML = '';
      result.innerHTML = '';

      data.questions.forEach((q, idx) => {
        const box = document.createElement('div');
        box.className = 'border rounded p-3';
        box.innerHTML = '<div class="fw-bold mb-2">' + (idx + 1) + '. ' + q.question + ' (' + q.marks + ' marks)</div>';
        q.options.forEach((opt, oi) => {
          const line = document.createElement('label');
          line.className = 'd-block mb-1';
          line.innerHTML = '<input type="radio" name="q_' + q.id + '" value="' + oi + '"> ' + opt;
          box.appendChild(line);
        });
        form.appendChild(box);
      });

      seconds = Number(data.duration_seconds || 1800);
      clearInterval(timer);
      timer = setInterval(() => {
        seconds -= 1;
        timerNode.textContent = 'Time Left: ' + formatTime(Math.max(0, seconds));
        if (seconds <= 0) {
          clearInterval(timer);
          submitTest(true);
        }
      }, 1000);
      timerNode.textContent = 'Time Left: ' + formatTime(seconds);
    }

    async function submitTest(autoMode) {
      if (!active) return;
      clearInterval(timer);
      const answers = collectAnswers();
      const elapsedSeconds = testStartedAtMs ? Math.max(1, Math.floor((Date.now() - testStartedAtMs) / 1000)) : null;
      const answeredCount = Object.keys(answers).length;
      const totalCount = (active.questions || []).length;
      if (!autoMode && elapsedSeconds !== null && elapsedSeconds < 120 && totalCount > 0 && answeredCount / totalCount >= 0.6) {
        sendViolation(
          'unusual_fast_answering',
          `Answered ${answeredCount}/${totalCount} in ${elapsedSeconds}s (possible unusual fast answering).`
        );
      }
      const resp = await fetch('/submit_test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ exam_session_id: active.exam_session_id, answers: answers })
      });
      const data = await resp.json();
      if (!resp.ok || !data.ok) {
        result.innerHTML = '<div class="text-danger">' + (data.message || 'Submission failed') + '</div>';
        return;
      }
      result.innerHTML =
        '<div class="alert alert-success">' +
        'Score: <strong>' + data.obtained_marks + '/' + data.total_marks + '</strong> (' + data.percentage + '%)' +
        '<br>Parent SMS: ' + (data.sms_status && data.sms_status.message ? data.sms_status.message : 'Not sent') +
        (autoMode ? '<br><small>Submitted automatically due to timeout.</small>' : '') +
        '</div>';
      active = null;
      statusNode.textContent = 'Test submitted.';
    }

    if (startBtn) {
      startBtn.addEventListener('click', function (e) {
        e.preventDefault();
        startTest();
      });
    } else {
      console.error('[Weekly Test] startBtn not found');
    }
    submitBtn.addEventListener('click', function (e) {
      e.preventDefault();
      submitTest(false);
    });
  })();
</script>

<script>
console.log("JS LOADED");

const student_id = 1;  // TEMP hardcode for testing

function sendViolation() {
    fetch("/log_violation", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            student_id: 1,
            violation_type: "tab_switch",
            details: "User switched tab"
        })
    })
    .then(res => res.json())
    .then(data => console.log("SUCCESS", data))
    .catch(err => console.error("ERROR", err));
}

window.onblur = function () {
    console.log("TAB SWITCH DETECTED");
    sendViolation();
};
</script>
{% endblock %}
