{% extends 'base.html' %}
{% block content %}
<h2>Subject Planner</h2>
<p class="text-muted">Saving today&apos;s plan also sends it to your saved email address automatically.</p>
<form method="post">
  <div class="mb-3"><label>Mandatory subject for today</label>
    <select class="form-select" name="mandatory_subject" required>
      {% for subj in subjects %}<option>{{ subj }}</option>{% endfor %}
    </select>
  </div>
  <div class="mb-3"><label>Optional extra subjects</label>
    {% for subj in subjects %}
      <div class="form-check">
        <input class="form-check-input" name="extra_subjects" value="{{ subj }}" type="checkbox" id="extra{{ loop.index }}">
        <label class="form-check-label" for="extra{{ loop.index }}">{{ subj }}</label>
      </div>
    {% endfor %}
  </div>
  <button class="btn btn-primary">Save plan</button>
</form>
{% endblock %}
